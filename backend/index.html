<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiko Audio Receiver</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px; 
            background: #1e1e2e; 
            color: #cdd6f4;
        }
        h1 { color: #f5e0dc; }
        .status { 
            display: inline-block;
            padding: 15px 25px; 
            margin-top: 20px; 
            border-radius: 8px; 
            background: #313244; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1>Aiko VTuber Pipeline</h1>
    <p>Waiting for Twitch chat messages...</p>
    <div class="status" id="status">Connecting to Codespace...</div>
    
    <!-- Hidden audio player -->
    <audio id="audioPlayer"></audio>

    <script>
        // Connect to the FastAPI WebSocket
        const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = wsProtocol + "//" + window.location.host + "/ws";
        const ws = new WebSocket(wsUrl);
        const statusDiv = document.getElementById("status");

        ws.onopen = () => {
            statusDiv.innerText = "✅ Connected! Listening for Aiko's voice.";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
    
            if (data.action === "play_audio") {
                // Display the chat message and response on your webpage!
                statusDiv.innerHTML = `
                    <p><strong>${data.chatter}:</strong> ${data.chat_message}</p>
                    <p style="color: #a6e3a1;"><strong>Aiko:</strong> ${data.aiko_reply}</p>
                `;
                
                const player = document.getElementById("audioPlayer");
                player.src = "/audio?t=" + new Date().getTime();
                player.play();
            }
        };

        ws.onclose = () => {
            statusDiv.innerText = "❌ Disconnected. Refresh the page.";
            statusDiv.style.background = "#450a0a";
            statusDiv.style.color = "#fca5a5";
        };
    </script>
</body>
</html>
